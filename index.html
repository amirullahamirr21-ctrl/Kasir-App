<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amir Qhan | Digital Product</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #fbfffc;
      --bg2: #f1fff6;
      --text: #07130d;
      --muted: #617069;
      --card: rgba(255, 255, 255, 0.88);
      --soft: #edf9f1;
      --green: #08c96d;
      --green-dark: #05a85b;
      --line: rgba(8, 201, 109, 0.22);
      --shadow: 0 20px 70px rgba(8, 201, 109, 0.14);
      --radius: 24px;
      --grad-start: rgba(255, 255, 255, 0.95);
      --grad-end: rgba(255, 255, 255, 0);
      --neon-bg: #ffffff;
      --neon-text: var(--green-dark);
      --grid-color: rgba(8, 201, 109, 0.05);
      --glow-bg: rgba(8, 201, 109, 0.18);
      color-scheme: light;
    }

    body[data-theme="dark"] {
      --bg1: #020403;
      --bg2: #07120d;
      --text: #f4fff8;
      --muted: #a4b6ac;
      --card: rgba(10, 20, 15, 0.86);
      --soft: rgba(57, 255, 136, 0.08);
      --green: #39ff88;
      --green-dark: #00d978;
      --line: rgba(57, 255, 136, 0.24);
      --shadow: 0 20px 70px rgba(57, 255, 136, 0.15);
      --grad-start: rgba(10, 20, 15, 0.95);
      --grad-end: rgba(10, 20, 15, 0);
      --neon-bg: #060e0a;
      --neon-text: #ffffff;
      --grid-color: rgba(57, 255, 136, 0.03); 
      --glow-bg: rgba(57, 255, 136, 0.08);
      color-scheme: dark;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background-color: var(--bg1);
      background-image: 
        radial-gradient(circle at top, var(--glow-bg), transparent 30%), 
        radial-gradient(circle at 18% 18%, var(--grid-color), transparent 26%), 
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg1) 100%);
      overflow-x: hidden;
      transition: background-color 0.6s ease, color 0.6s ease;
    }

    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index:-1;
      background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 42px 42px; mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    a { color: inherit; text-decoration: none; cursor: pointer; }
    button, input, textarea, select { font: inherit; outline: none; border: none; }

    .profile-card, .product-row, .square-card, .banner-stack, .info-section, .icon-btn, .admin-card, .admin-box, .neon-btn {
      transition: background-color 0.5s ease, background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease, color 0.5s ease;
    }

    .view-container {
      width: 100%; min-height: 100vh; position: absolute; top: 0; left: 0;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
    }
    #mainView { z-index: 1; }
    
    #detailView {
      z-index: 50;
      background: var(--bg1);
      transform: translateY(100%);
      opacity: 0;
      position: fixed;
      overflow-y: auto;
      visibility: hidden;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease, background 0.6s ease;
    }
    #detailView.active {
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
    }

    .top-actions { position: fixed; top: 14px; right: 14px; z-index: 80; display: flex; gap: 8px; }
    .nav-back { position: fixed; top: 14px; left: 14px; z-index: 80; display: none; }

    .icon-btn {
      width: 42px; height: 42px; border: 1px solid var(--line); border-radius: 15px;
      background: var(--card); color: var(--text); display: grid; place-items: center; cursor: pointer;
      backdrop-filter: blur(14px); box-shadow: 0 12px 34px rgba(8, 201, 109, 0.10);
    }
    .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .wrap { width: min(520px, calc(100% - 28px)); margin: 0 auto; padding: 34px 0 38px; position: relative; }
    .loading { min-height: 52vh; display: grid; place-items: center; color: var(--muted); font-weight: 800; }
    
    .scroll-item { animation: scrollFadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes scrollFadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceSoft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    .section-label span, .product-info h2 span, .square-title span, .neon-btn span, .detail-title span { color: var(--green); }

    .profile-card { text-align: center; margin-bottom: 24px; padding: 28px 22px 24px; border-radius: 34px; border: 1px solid var(--line); background: radial-gradient(circle at top, rgba(8, 201, 109, 0.14), transparent 42%), var(--card); box-shadow: var(--shadow); backdrop-filter: blur(18px); }
    .photo-ring { width: 124px; height: 124px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 50%; position: relative; background: radial-gradient(circle, rgba(8, 201, 109, 0.28), transparent 68%); box-shadow: 0 0 72px rgba(8, 201, 109, 0.20); }
    .photo-ring::before { content: ""; position: absolute; inset: -7px; border: 1px solid var(--line); border-radius: 50%; box-shadow: inset 0 0 24px rgba(8, 201, 109, 0.14); }
    .photo { width: 106px; height: 106px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(8, 201, 109, 0.62); background: var(--soft); }
    .tagline { width: fit-content; margin: 0 auto 12px; padding: 7px 12px; border-radius: 999px; background: var(--soft); border: 1px solid var(--line); color: var(--green-dark); font-size: 11px; font-weight: 900; letter-spacing: 0.09em; }
    .name { font-family: "Bricolage Grotesque", sans-serif; font-size: clamp(34px, 8vw, 48px); font-weight: 800; line-height: 0.98; letter-spacing: -0.06em; margin-bottom: 10px; }
    .desc { max-width: 390px; margin: 0 auto; color: var(--muted); font-size: 14.5px; line-height: 1.65; }
    .socials { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .socials a { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 15px; background: var(--card); border: 1px solid var(--line); color: var(--text); transition: 0.25s ease; }
    .socials a:hover { transform: translateY(-3px); color: var(--green-dark); }
    .socials svg { width: 21px; height: 21px; fill: currentColor; }

    .main-feed { display: flex; flex-direction: column; gap: 14px; }
    
    .neon-btn { display: flex; align-items: center; justify-content: center; width: 100%; min-height: 62px; padding: 12px 20px; border-radius: 20px; background: var(--neon-bg); color: var(--neon-text); font-weight: 800; font-size: 14.5px; border: 1px solid rgba(8, 201, 109, 0.6); box-shadow: 0 0 16px rgba(8, 201, 109, 0.25), inset 0 0 8px rgba(8, 201, 109, 0.15); animation: scrollFadeUp 0.6s ease both, neonPulse 3s infinite alternate; }
    .neon-btn:hover { transform: translateY(-4px) scale(1.015); box-shadow: 0 0 24px rgba(8, 201, 109, 0.5), inset 0 0 12px rgba(8, 201, 109, 0.3); border-color: rgba(8, 201, 109, 1); }
    @keyframes neonPulse { 0% { box-shadow: 0 0 12px rgba(8,201,109,0.2), inset 0 0 5px rgba(8,201,109,0.1); } 50% { box-shadow: 0 0 22px rgba(8,201,109,0.45), inset 0 0 10px rgba(8,201,109,0.25); } 100% { box-shadow: 0 0 12px rgba(8,201,109,0.2), inset 0 0 5px rgba(8,201,109,0.1); } }

    .category-block { margin-top: 10px; margin-bottom: -6px; }
    .section-label { color: var(--green-dark); font-size: 12px; font-weight: 900; letter-spacing: 0.14em; text-align: center; }

    /* Card Box (Bukan lagi sebagai tombol utama) */
    .product-row { display: grid; grid-template-columns: 64px minmax(0, 1fr) auto; align-items: center; gap: 12px; min-height: 88px; padding: 12px; border-radius: var(--radius); border: 1px solid var(--line); background: radial-gradient(circle at 16% 50%, rgba(8, 201, 109, 0.11), transparent 36%), var(--card); box-shadow: 0 16px 50px rgba(8, 201, 109, 0.09); backdrop-filter: blur(18px); }
    .thumb { width: 64px; height: 64px; border-radius: 18px; object-fit: cover; background: var(--soft); border: 1px solid var(--line); }
    .product-info h2 { font-size: 14px; line-height: 1.22; letter-spacing: -0.035em; margin-bottom: 4px; }
    .product-info p { color: var(--muted); font-size: 11.5px; line-height: 1.38; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* TOMBOL BELI (Inilah yang diklik) */
    .buy-pill { min-width: 65px; height: 32px; display: inline-flex; align-items: center; justify-content: center; padding: 0 13px; border-radius: 999px; background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #ffffff; font-size: 11px; font-weight: 900; box-shadow: 0 14px 34px rgba(8, 201, 109, 0.23); white-space: nowrap; cursor: pointer; transition: transform 0.2s ease; border:none; }
    .buy-pill.animate { animation: wiggle 4s ease-in-out infinite; }
    .buy-pill:hover { transform: translateY(-3px) scale(1.04); }

    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .square-card { border-radius: var(--radius); border: 1px solid var(--line); background: var(--card); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 16px 50px rgba(8, 201, 109, 0.08); position: relative; }
    .square-img-wrap { width: 100%; aspect-ratio: 1/1; position: relative; background: rgba(8, 201, 109, 0.05); }
    .square-img { width: 100%; height: 100%; object-fit: cover; }
    .square-overlay { position: absolute; bottom: -1px; left: 0; right: 0; height: 70%; background: linear-gradient(to top, var(--grad-start) 10%, var(--grad-end) 100%); }
    .square-content { padding: 0 12px 12px; display: flex; flex-direction: column; flex-grow: 1; margin-top: -35px; position: relative; z-index: 2; }
    .square-title { font-size: 14px; line-height: 1.3; letter-spacing: -0.02em; font-weight: 900; margin-bottom: 5px; }
    .square-desc { color: var(--muted); font-size: 10.5px; line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .square-btn { width: 100%; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #ffffff; font-size: 10.5px; font-weight: 900; box-shadow: 0 10px 25px rgba(8, 201, 109, 0.25); margin-top: auto; cursor: pointer; transition: transform 0.2s; border:none;}
    .square-btn:hover { transform: translateY(-2px) scale(1.02); }

    .banner-stack { display: flex; flex-direction: column; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); box-shadow: 0 16px 50px rgba(8, 201, 109, 0.09); background: var(--card); }
    .banner-img { width: 100%; height: auto; display: block; object-fit: cover; margin: 0; }
    .banner-item { display: block; cursor: pointer; }

    .detail-hero { width: 100%; height: 320px; position: relative; background: var(--card); transition: background 0.6s; }
    .detail-hero-img { width: 100%; height: 100%; object-fit: cover; }
    .detail-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 40%, var(--bg1) 100%); transition: background 0.6s; }
    .detail-content { padding: 0 20px 100px; margin-top: -60px; position: relative; z-index: 2; }
    
    .detail-title { font-family: "Bricolage Grotesque", sans-serif; font-size: 28px; font-weight: 800; line-height: 1.1; letter-spacing: -0.04em; margin-bottom: 15px; }
    .detail-desc-short { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; font-weight: 500;}
    
    .detail-gallery { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 20px; scroll-snap-type: x mandatory; scrollbar-width: none; }
    .detail-gallery::-webkit-scrollbar { display: none; }
    .gallery-img { flex: 0 0 85%; height: 200px; border-radius: 16px; object-fit: cover; scroll-snap-align: center; border: 1px solid var(--line); background: var(--card); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

    .info-section { margin-bottom: 16px; background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 16px 20px; box-shadow: 0 8px 25px rgba(8,201,109,0.05); }
    .info-head { font-weight: 800; font-size: 15px; color: var(--text); display: flex; justify-content: space-between; align-items: center; transition: color 0.5s; }
    .info-body { margin-top: 12px; color: var(--muted); font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; }
    
    .detail-bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: rgba(var(--bg1), 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--line); display: flex; gap: 10px; z-index: 60; transition: background 0.6s, border-color 0.5s; }
    .btn-secondary { flex: 1; height: 48px; border-radius: 14px; background: var(--soft); color: var(--green-dark); font-weight: 800; font-size: 13px; display: grid; place-items: center; border: 1px solid var(--line); transition: background 0.3s; }
    .btn-buy-large { flex: 2; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; font-weight: 900; font-size: 14px; display: grid; place-items: center; box-shadow: 0 10px 25px rgba(8, 201, 109, 0.3); animation: bounceSoft 2s infinite; }
    
    .modal { position: fixed; inset: 0; z-index: 100; display: none; place-items: center; padding: 18px; background: rgba(0,0,0,0.55); backdrop-filter: blur(10px); }
    .modal.active { display: grid; }
    .admin-box { width: min(860px, 100%); max-height: 88vh; overflow: auto; border-radius: 28px; border: 1px solid var(--line); background: var(--bg1); padding: 22px; position: relative;}
    .admin-head { display: flex; justify-content: space-between; margin-bottom: 18px; }
    .admin-head h2 { font-family: "Bricolage Grotesque", sans-serif; font-size: 24px; }
    .close-btn { width: 36px; height: 36px; border: 1px solid var(--line); border-radius: 12px; background: var(--card); cursor: pointer; font-size: 18px; display: grid; place-items: center;}

    .field { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 12.5px; font-weight: 800; }
    input, textarea, select { width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line); background: var(--card); color: var(--text); transition: background 0.5s, color 0.5s, border-color 0.5s;}
    textarea { min-height: 80px; resize: vertical; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .tab-nav { display: flex; gap: 10px; border-bottom: 1px solid var(--line); margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;}
    .tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-weight: 700; padding: 8px 12px; cursor: pointer; font-size: 13.5px; white-space: nowrap;}
    .tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; animation: scrollFadeUp 0.4s ease; }

    .admin-card { border: 1px solid var(--line); background: var(--card); border-radius: 16px; padding: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;}
    .admin-actions { display: flex; gap: 8px; }
    
    .primary-btn { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; padding: 10px 20px; border-radius: 12px; font-weight: 800; cursor: pointer;}
    .ghost-btn { background: var(--soft); color: var(--green-dark); padding: 8px 16px; border-radius: 10px; border: 1px solid var(--line); font-weight: 700; font-size: 12px; cursor: pointer;}
    .danger-btn { background: rgba(255, 66, 66, 0.1); color: #ff6262; padding: 8px 16px; border-radius: 10px; border: 1px solid rgba(255, 66, 66, 0.2); font-weight: 700; font-size: 12px; cursor: pointer;}
    .status { color: var(--green-dark); font-size: 13px; font-weight: 800; margin-top: 10px; }

    /* Editor Box Mengambang */
    .editor-popup { position: absolute; inset: 0; background: var(--bg1); z-index: 10; display: none; flex-direction: column; padding: 20px; border-radius: 28px; overflow-y: auto;}
    .editor-popup.active { display: flex; animation: scrollFadeUp 0.3s cubic-bezier(0.22, 1, 0.36, 1); }

    .upload-btn { background: var(--soft); border: 1px dashed var(--green); color: var(--green-dark); padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; text-align: center; display: inline-block; width: 100%; margin-top: 4px; font-weight: 600; }
    
    /* PENGATURAN LAYAR MOBILE KECIL */
    @media (max-width: 430px) {
      .wrap { width: min(100% - 20px, 520px); padding-top: 24px; }
      .product-row { grid-template-columns: 56px minmax(0, 1fr) auto; padding: 10px; }
      .product-info h2 { font-size: 12.5px; } .product-info p { font-size: 10.5px; } 
      .buy-pill { min-width: 58px; height: 30px; font-size: 10px; }
      .grid-2 { grid-template-columns: 1fr; } 
      .mini-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .square-content { padding: 0 10px 10px; margin-top: -30px; }
      .square-title { font-size: 12.5px; } .square-desc { font-size: 9.5px; }
      .detail-title { font-size: 24px; }
      .detail-hero { height: 260px; }
    }
    @keyframes wiggle { 0%, 88%, 100% { transform: rotate(0deg) scale(1); } 90% { transform: rotate(-3deg) scale(1.04); } 92% { transform: rotate(3deg) scale(1.04); } 94% { transform: rotate(-2deg) scale(1.03); } 96% { transform: rotate(2deg) scale(1.03); } }
  </style>
</head>

<body>
  <div id="mainView" class="view-container">
    <div class="top-actions">
      <button class="icon-btn" onclick="toggleTheme()" aria-label="Ganti tema"><span id="themeIcon">🌙</span></button>
      <button class="icon-btn" id="adminTopBtn" onclick="openAdmin()" aria-label="Login admin">
        <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/></svg>
      </button>
    </div>

    <main class="wrap" id="app">
      <div class="loading">Loading.. </div>
    </main>
  </div>

  <div id="detailView" class="view-container">
    <button class="icon-btn nav-back" onclick="closeDetail()" aria-label="Kembali" id="btnBack">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div id="detailContent"></div>
  </div>

  <div class="modal" id="adminModal">
    <div class="admin-box">
      <div class="admin-head">
        <div><h2>Admin Panel</h2><p style="color:var(--muted); font-size:12px;">Kelola web dari sini.</p></div>
        <button class="close-btn" onclick="closeAdmin()">×</button>
      </div>

      <form id="loginForm">
        <div class="field"><label>Username</label><input id="adminUsername" placeholder="****" required></div>
        <div class="field"><label>Password</label><input id="adminPassword" type="password" placeholder="****" required></div>
        <button class="primary-btn" style="width:100%;" type="submit">Login</button>
        <div class="status" id="loginStatus"></div>
      </form>

      <div id="dashboard" style="display:none;">
        <div class="tab-nav">
          <button type="button" class="tab-btn active" onclick="switchTab('tab-profile')">Profil</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-category')">Kategori</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-product')">Produk</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-layer')">Layer</button>
        </div>

        <div id="tab-profile" class="tab-pane active">
          <div class="grid-2">
            <div class="field"><label>Nama</label><input id="editName"></div>
            <div class="field"><label>Tagline</label><input id="editTagline"></div>
          </div>
          <div class="field"><label>Deskripsi Profil</label><textarea id="editDescription"></textarea></div>
          <div class="field">
            <label>Foto Profil (URL)</label>
            <input id="editPhoto" placeholder="Bisa paste URL atau upload ->">
            <label class="upload-btn"><input type="file" style="display:none" accept="image/*" onchange="uploadImage(this, 'editPhoto')">Atau Upload Gambar Baru</label>
          </div>
          <div class="grid-2">
            <div class="field"><label>Instagram</label><input id="editInstagram"></div>
            <div class="field"><label>TikTok</label><input id="editTiktok"></div>
            <div class="field"><label>YouTube</label><input id="editTelegram"></div>
            <div class="field"><label>Email</label><input id="editEmail"></div>
          </div>
          <button class="primary-btn" style="width:100%;" onclick="saveProfile()" type="button">Simpan Profil</button>
          <div class="status" id="profileStatus"></div>
        </div>

        <div id="tab-category" class="tab-pane">
          <button class="primary-btn" style="width:100%; margin-bottom:15px;" onclick="openEditor('category')" type="button">+ Tambah Kategori Baru</button>
          <div id="adminCategoriesList"></div>
        </div>

        <div id="tab-product" class="tab-pane">
          <button class="primary-btn" style="width:100%; margin-bottom:15px;" onclick="openEditor('product')" type="button">+ Tambah Item (Tautan/Banner/Produk)</button>
          <div id="adminProductsList"></div>
        </div>

        <div id="tab-layer" class="tab-pane">
          <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">Semua item (Tautan, Kategori, Produk, Banner) tampil di sini bebas. Ubah angka urutan, lalu Simpan Posisi.</p>
          <div id="layer-all"></div>
          <button class="primary-btn" style="width:100%; margin-top:10px;" onclick="saveAllLayers()" type="button">Simpan Posisi</button>
          <div class="status" id="layerStatus"></div>
        </div>

        <!-- Pop-up Editor Box dalam Admin -->
        <div id="editorPopup" class="editor-popup">
          <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3 id="editorTitle">Edit Item</h3>
            <button class="ghost-btn" onclick="closeEditor()">Batal</button>
          </div>
          <div id="editorFormContent"></div>
          <button class="primary-btn" style="width:100%; margin-top:15px;" onclick="saveEditorData()">Simpan Data</button>
          <div class="status" id="editorStatus"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // PASTE URL DEPLOYMENT GOOGLE APPS SCRIPT DI BAWAH INI
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybUOw50nNi6TolfIlIEx8TtXbeqt2lmboOJOrdaKzJHh5fejifM3xINM1VP-MNugK0rQ/exec";
    const IMGBB_API_KEY = "647f2db8d447a216fcb5bda14088a2ed"; 

    // Mencegah ikon admin muncul kecuali disengaja melalui URL parameter (?admin=1)
    const urlParams = new URLSearchParams(window.location.search);
    const isAdminMode = urlParams.has('admin') || window.location.hash.includes("admin");
    if (isAdminMode) document.getElementById("adminTopBtn").style.display = "grid";

    let appData = { profile: {}, categories: [], products: [] };
    let currentEditItem = null;
    let currentEditType = null;
    let modifiedLayers = {};

    // Menghandle Tema Gelap/Terang
    const savedTheme = localStorage.getItem("theme") || "light";
    document.body.dataset.theme = savedTheme;
    updateThemeIcon();

    function toggleTheme() {
      const next = (document.body.dataset.theme || "light") === "light" ? "dark" : "light";
      document.body.dataset.theme = next;
      localStorage.setItem("theme", next);
      updateThemeIcon();
    }
    function updateThemeIcon() { document.getElementById("themeIcon").textContent = (document.body.dataset.theme || "light") === "light" ? "🌙" : "☀️"; }

    // Utilitas Membersihkan Teks dari Kode Berbahaya & Memformat Judul [Teks]
    function esc(text) { return String(text || "").replace(/[&<>"']/g, function(m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]; }); }
    function formatTitle(title) { return esc(title).replace(/\[(.*?)\]/g, "<span>$1</span>"); }

    async function api(action, params = {}) {
      if (!GAS_URL || GAS_URL.includes("PASTE_URL")) throw new Error("URL Server belum diatur.");
      const activeToken = sessionStorage.getItem("admin_token");
      if (activeToken) params.token = activeToken;

      try {
        const response = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, ...params }) });
        const result = await response.json();
        if (!result.ok && result.message && result.message.includes("Sesi admin tidak valid")) sessionStorage.removeItem("admin_token");
        if (!result.ok) throw new Error(result.message);
        return result;
      } catch (error) { throw new Error(error.message || "Koneksi server gagal."); }
    }

    async function loadData() {
      try {
        const res = await api("getData");
        appData = res.data;
        renderMainView();
      } catch (e) { document.getElementById("app").innerHTML = `<div class="loading">${esc(e.message)}</div>`; }
    }

    async function uploadImage(fileInput, targetInputId) {
      if (!fileInput.files.length) return;
      const targetInput = document.getElementById(targetInputId);
      const oriVal = targetInput.value;
      targetInput.value = "Sedang mengupload...";
      
      const formData = new FormData();
      formData.append("image", fileInput.files[0]);
      
      try {
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) { targetInput.value = data.data.url; } 
        else { throw new Error("Gagal dari ImgBB"); }
      } catch (e) { alert("Upload gagal."); targetInput.value = oriVal; }
      fileInput.value = ""; 
    }

    function renderMainView() {
      const p = appData.profile || {};
      let html = "";

      // Render Profil Box
      if (p.name || p.description) {
        html += `<section class="profile-card scroll-item">
            ${p.photo ? `<div class="photo-ring"><img class="photo" src="${esc(p.photo)}"></div>` : ""}
            ${p.tagline ? `<div class="tagline">${esc(p.tagline)}</div>` : ""}
            <h1 class="name">${esc(p.name||'').replace(/AI$/i, "<span>AI</span>")}</h1>
            <p class="desc">${esc(p.description||'')}</p>
            <div class="socials">
              ${p.instagram ? `<a href="${esc(p.instagram)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6A3.6 3.6 0 0 0 16.4 4H7.6Zm9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg></a>` : ""}
              ${p.tiktok ? `<a href="${esc(p.tiktok)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M16.6 5.82A5.66 5.66 0 0 0 20 7V10a8.7 8.7 0 0 1-3.4-.72v6.7A6.02 6.02 0 1 1 10.58 10c.36 0 .7.03 1.03.1v3.18a2.75 2.75 0 1 0 1.85 2.6V2h3.14v3.82Z"/></svg></a>` : ""}
              ${p.telegram ? `<a href="${esc(p.telegram)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M21.58 5.49a2.72 2.72 0 0 0-1.92-1.92C18 3.12 12 3.12 12 3.12s-6 0-7.66.45A2.72 2.72 0 0 0 2.42 5.5C2 7.16 2 12 2 12s0 4.84.45 6.51a2.72 2.72 0 0 0 1.92 1.91c1.66.46 7.63.46 7.63.46s5.97 0 7.66-.46a2.72 2.72 0 0 0 1.92-1.91C22 16.84 22 12 22 12s0-4.84-.42-6.51ZM10 15.5V8.5l6.5 3.5-6.5 3.5Z"/></svg></a>` : ""}
              ${p.email ? `<a href="${p.email.includes("mailto:") ? esc(p.email) : "mailto:" + esc(p.email)}"><svg viewBox="0 0 24 24"><path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm8 8.15L4.7 7H4v.35l8 6.75 8-6.75V7h-.7L12 13.15Z"/></svg></a>` : ""}
            </div>
          </section>`;
      }

      // Gabungkan Semua Elemen Berdasarkan Angka Urutan
      const categories = (appData.categories || []).filter(c => c.status === "active");
      const products = (appData.products || []).filter(p => p.status === "active");
      let allItems = [];
      categories.forEach(c => allItems.push({...c, _itemType: 'category'}));
      products.forEach(p => allItems.push({...p, _itemType: p.type || 'row'})); 
      allItems.sort((a, b) => Number(a.sort || 999) - Number(b.sort || 999));

      if (allItems.length > 0) {
        html += `<div class="main-feed">`;
        
        allItems.forEach((item, i) => {
          const delay = `style="animation-delay: ${i * 0.04}s"`; // Efek Stagger Animasi CSS Murni (Aman tanpa bug hilang)
          const isDirectLink = item.actionType === 'direct'; 
          
          if (item._itemType === 'category') {
            html += `<div class="category-block scroll-item" ${delay}><p class="section-label">${formatTitle(item.title)}</p></div>`;
          }
          else if (item._itemType === 'link') {
            html += `<a href="${esc(item.link)}" target="_blank" class="neon-btn scroll-item" ${delay}>${formatTitle(item.title)}</a>`;
          }
          else if (item._itemType === 'banner') {
            const isFirst = i === 0 || allItems[i-1]._itemType !== 'banner';
            const isLast = i === allItems.length - 1 || allItems[i+1]._itemType !== 'banner';
            if (isFirst) html += `<div class="banner-stack scroll-item" ${delay}>`;
            
            // Banner juga bisa diklik jika ada linknya
            if(item.link && isDirectLink) {
                html += `<a href="${esc(item.link)}" target="_blank" class="banner-item"><img class="banner-img" src="${esc(item.image)}"></a>`;
            } else if (item.link) {
                html += `<a onclick="openDetail('${item.id}')" class="banner-item"><img class="banner-img" src="${esc(item.image)}"></a>`;
            } else {
                html += `<div class="banner-item"><img class="banner-img" src="${esc(item.image)}"></div>`;
            }
            
            if (isLast) html += `</div>`;
          }
          else if (item._itemType === 'row') {
            // Kontainer card dibiarkan polos tanpa fungsi klik, Fungsi Klik hanya di Tombol
            html += `<div class="product-row scroll-item" ${delay}>
              <img class="thumb" src="${esc(item.image)}">
              <div class="product-info"><h2>${formatTitle(item.title)}</h2><p>${esc(item.description)}</p></div>
              ${isDirectLink 
                 ? `<a class="buy-pill animate" href="${esc(item.link)}" target="_blank">${esc(item.buttonText || "Beli")}</a>` 
                 : `<button class="buy-pill animate" onclick="openDetail('${item.id}')">${esc(item.buttonText || "Beli")}</button>`}
            </div>`;
          }
          else if (item._itemType === 'square') {
            const isFirst = i === 0 || allItems[i-1]._itemType !== 'square';
            const isLast = i === allItems.length - 1 || allItems[i+1]._itemType !== 'square';
            
            if (isFirst) html += `<div class="mini-grid scroll-item" ${delay}>`;
            
            // Kontainer card dibiarkan polos tanpa fungsi klik, Fungsi Klik hanya di Tombol
            html += `<div class="square-card">
              <div class="square-img-wrap"><img class="square-img" src="${esc(item.image)}"><div class="square-overlay"></div></div>
              <div class="square-content">
                <h3 class="square-title">${formatTitle(item.title)}</h3>
                <p class="square-desc">${esc(item.description)}</p>
                ${isDirectLink 
                 ? `<a class="square-btn" href="${esc(item.link)}" target="_blank">${esc(item.buttonText || "Beli")}</a>` 
                 : `<button class="square-btn" onclick="openDetail('${item.id}')">${esc(item.buttonText || "Beli")}</button>`}
              </div>
            </div>`;
            
            if (isLast) html += `</div>`;
          }
        });
        html += `</div>`;
      } else {
        html += `<div class="empty-state">Belum ada data aktif saat ini.</div>`;
      }

      document.getElementById("app").innerHTML = html;
    }

    function openDetail(id) {
      const product = appData.products.find(p => p.id === id);
      if (!product) return;

      const galleryImgs = product.detailImages ? product.detailImages.split(',').map(s=>s.trim()).filter(s=>s) : [];
      let galleryHtml = "";
      if (galleryImgs.length > 0) {
        galleryHtml = `<div class="detail-gallery scroll-item">
          ${galleryImgs.map(img => `<img src="${esc(img)}" class="gallery-img">`).join('')}
        </div>`;
      }

      let html = `
        <div class="detail-hero">
          <img src="${esc(product.image)}" class="detail-hero-img">
          <div class="detail-hero-overlay"></div>
        </div>
        
        <div class="detail-content wrap" style="padding-top:0;">
          <h1 class="detail-title scroll-item">${formatTitle(product.title)}</h1>
          <p class="detail-desc-short scroll-item">${esc(product.description)}</p>
          
          ${galleryHtml}

          ${product.fullDescription ? `
          <div class="info-section scroll-item">
            <div class="info-head">Deskripsi Lengkap</div>
            <div class="info-body">${esc(product.fullDescription)}</div>
          </div>` : ''}

          ${product.features ? `
          <div class="info-section scroll-item">
            <div class="info-head">Fitur-Fitur</div>
            <div class="info-body">${esc(product.features).replace(/\n/g, '<br>• ')}</div>
          </div>` : ''}
        </div>

        <div class="detail-bottom-bar wrap" style="padding-top:15px; padding-bottom:15px; background:transparent;">
          ${product.linkTutorial ? `<a href="${esc(product.linkTutorial)}" target="_blank" class="btn-secondary">Tutorial</a>` : ''}
          ${product.linkContact ? `<a href="${esc(product.linkContact)}" target="_blank" class="btn-secondary">Hubungi</a>` : ''}
          <a href="${esc(product.link)}" target="_blank" class="btn-buy-large">${esc(product.buttonText || "BELI SEKARANG")}</a>
        </div>
      `;

      document.getElementById('detailContent').innerHTML = html;
      document.getElementById('btnBack').style.display = 'grid'; // Munculkan tombol kembali
      document.getElementById('detailView').classList.add('active');
      window.scrollTo(0,0);
    }

    function closeDetail() {
      document.getElementById('detailView').classList.remove('active');
      document.getElementById('btnBack').style.display = 'none'; // Sembunyikan tombol kembali
      setTimeout(() => {
        document.getElementById('detailContent').innerHTML = "";
      }, 400); // Bersihkan isi setelah animasi turun selesai
    }

    function openAdmin() {
      document.getElementById("adminModal").classList.add("active");
      if (sessionStorage.getItem("admin_token")) showDashboard();
    }
    function closeAdmin() { document.getElementById("adminModal").classList.remove("active"); }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      document.getElementById("loginStatus").textContent = "Loading...";
      try {
        const res = await api("login", { username: adminUsername.value, password: adminPassword.value });
        sessionStorage.setItem("admin_token", res.token);
        showDashboard();
      } catch (err) { document.getElementById("loginStatus").textContent = err.message; }
    });

    async function showDashboard() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      await refreshAdminData();
    }

    async function refreshAdminData() {
      try {
        const res = await api("getData");
        if (res.ok) {
          appData = res.data;
          renderMainView(); 
          fillAdminProfile();
          renderAdminLists();
        }
      } catch (e) {}
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    function fillAdminProfile() {
      const p = appData.profile || {};
      ['Name', 'Tagline', 'Description', 'Photo', 'Instagram', 'Tiktok', 'Telegram', 'Email'].forEach(k => {
        if(document.getElementById(`edit${k}`)) document.getElementById(`edit${k}`).value = p[k.toLowerCase()] || "";
      });
    }

    async function saveProfile() {
      document.getElementById("profileStatus").textContent = "Menyimpan...";
      try {
        await api("saveProfile", {
          name: editName.value, tagline: editTagline.value, description: editDescription.value, photo: editPhoto.value,
          instagram: editInstagram.value, tiktok: editTiktok.value, telegram: editTelegram.value, email: editEmail.value
        });
        document.getElementById("profileStatus").textContent = "Tersimpan.";
        refreshAdminData();
      } catch (err) {}
    }

    function renderAdminLists() {
      // List Kategori
      const cats = (appData.categories || []).sort((a,b) => Number(a.sort||0) - Number(b.sort||0));
      document.getElementById("adminCategoriesList").innerHTML = cats.map(c => `
        <div class="admin-card">
          <div><div style="font-weight:bold; font-size:14px;">${esc(c.title)}</div><div style="font-size:11px; color:var(--muted)">Urutan: ${c.sort} | ${c.status}</div></div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="openEditor('category', '${c.id}')">Edit</button>
            <button class="danger-btn" onclick="deleteItem('deleteCategory', '${c.id}')">X</button>
          </div>
        </div>
      `).join("");

      // List Produk/Tautan/Banner
      const prods = (appData.products || []).sort((a,b) => Number(a.sort||0) - Number(b.sort||0));
      document.getElementById("adminProductsList").innerHTML = prods.map(p => `
        <div class="admin-card">
          <div>
            <div style="font-size:10px; color:var(--green-dark); font-weight:800; text-transform:uppercase">${p.type || 'row'}</div>
            <div style="font-weight:bold; font-size:14px;">${esc(p.title || 'Tanpa Judul')}</div>
            <div style="font-size:11px; color:var(--muted)">Urutan: ${p.sort}</div>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="openEditor('product', '${p.id}')">Edit</button>
            <button class="danger-btn" onclick="deleteItem('deleteProduct', '${p.id}')">X</button>
          </div>
        </div>
      `).join("");
      
      // Render Tab Layer Flat (Campur semua, urutkan murni dari angka sort)
      modifiedLayers = {};
      let all = [...cats, ...prods].sort((a, b) => Number(a.sort || 999) - Number(b.sort || 999));
      document.getElementById("layer-all").innerHTML = all.map(item => {
        let label = item.type === "link" ? "Tautan" : item.type === "banner" ? "Banner" : item.type ? "Produk" : "Kategori Label";
        let color = item.type === "link" ? "#00b4d8" : item.type === "banner" ? "#ff9800" : item.type ? "#9c27b0" : "#00d978";
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line);">
          <div style="display:flex; flex-direction:column; gap:4px;">
             <span style="font-size:10px; font-weight:800; color:${color};">${label}</span>
             <span style="font-size:13px; font-weight:600;">${esc(item.title || "Tanpa Judul")}</span>
          </div>
          <input style="width:70px; text-align:center;" type="number" value="${esc(item.sort)}" onchange="modifiedLayers['${item.id}'] = this.value">
        </div>`;
      }).join("");
    }

    async function saveAllLayers() {
      const keys = Object.keys(modifiedLayers);
      if(keys.length === 0) return;
      document.getElementById("layerStatus").textContent = "Menyimpan...";
      for(let id of keys) {
        let isCat = appData.categories.find(c => c.id === id);
        let item = isCat || appData.products.find(p => p.id === id);
        if(item) await api(isCat ? "saveCategory" : "saveProduct", { ...item, sort: modifiedLayers[id] });
      }
      document.getElementById("layerStatus").textContent = "Selesai!";
      refreshAdminData();
    }

    function openEditor(type, id = null) {
      currentEditType = type;
      currentEditItem = id ? appData[type === 'category' ? 'categories' : 'products'].find(x => x.id === id) : {};
      
      document.getElementById("editorTitle").textContent = id ? `Edit ${type}` : `Tambah ${type} Baru`;
      document.getElementById("editorPopup").classList.add('active');

      let formHtml = `<input type="hidden" id="form_id" value="${id || (type === 'category' ? 'C' : 'P') + Date.now()}">`;
      
      if (type === 'category') {
        formHtml += `
          <div class="field"><label>Judul Label Kategori</label><input id="form_title" value="${esc(currentEditItem.title)}"></div>
          <div class="grid-2">
            <div class="field"><label>Urutan Posisi</label><input id="form_sort" type="number" value="${esc(currentEditItem.sort || 99)}"></div>
            <div class="field"><label>Status</label><select id="form_status"><option value="active" ${currentEditItem.status==='active'?'selected':''}>Aktif</option><option value="hidden" ${currentEditItem.status==='hidden'?'selected':''}>Sembunyi</option></select></div>
          </div>
        `;
      } else {
        const cats = appData.categories || [];
        formHtml += `
          <div class="field"><label>Pilih Tipe Web</label>
            <select id="form_type" onchange="toggleFormFields()">
              <option value="row" ${(currentEditItem.type||'row')==='row'?'selected':''}>Produk Baris (Row)</option>
              <option value="square" ${currentEditItem.type==='square'?'selected':''}>Produk Kotak (Grid)</option>
              <option value="link" ${currentEditItem.type==='link'?'selected':''}>Tombol Tautan (Neon)</option>
              <option value="banner" ${currentEditItem.type==='banner'?'selected':''}>Gambar Banner Khusus</option>
            </select>
          </div>
          
          <div class="field"><label>Aksi Saat Diklik</label>
            <select id="form_actionType" onchange="toggleFormFields()">
              <option value="direct" ${(currentEditItem.actionType||'direct')==='direct'?'selected':''}>Langsung Pergi ke Link Website</option>
              <option value="detail" ${currentEditItem.actionType==='detail'?'selected':''}>Buka Halaman Detail (Meluncur dari Bawah)</option>
            </select>
          </div>
          
          <div class="grid-2">
            <div class="field"><label>Urutan Tampil</label><input id="form_sort" type="number" value="${esc(currentEditItem.sort || 99)}"></div>
            <div class="field"><label>Status Tayang</label><select id="form_status"><option value="active" ${(currentEditItem.status||'active')==='active'?'selected':''}>Aktif</option><option value="hidden" ${currentEditItem.status==='hidden'?'selected':''}>Sembunyi</option></select></div>
          </div>

          <div class="field"><label>Judul Teks (Gunakan [kata] utk warna hijau)</label><input id="form_title" value="${esc(currentEditItem.title)}"></div>
          
          <div class="field" id="wrap_desc"><label>Deskripsi Singkat (Tampil di Card Luar)</label><textarea id="form_description" style="min-height:50px">${esc(currentEditItem.description)}</textarea></div>
          
          <div class="field" id="wrap_img">
            <label>Gambar Utama URL</label>
            <input id="form_image" value="${esc(currentEditItem.image)}" placeholder="Paste URL">
            <label class="upload-btn"><input type="file" style="display:none" accept="image/*" onchange="uploadImage(this, 'form_image')">Upload Gambar via Komputer/HP</label>
          </div>
          
          <div class="field" id="wrap_btn"><label>Teks Tombol Beli</label><input id="form_buttonText" value="${esc(currentEditItem.buttonText||'Beli Sekarang')}"></div>
          <div class="field"><label id="lbl_link">Link URL Tujuan / Link Pembelian</label><input id="form_link" value="${esc(currentEditItem.link)}"></div>

          <!-- KOTAK KHUSUS HALAMAN DETAIL (Dinamis disembunyikan/ditampilkan) -->
          <div id="wrap_detail" style="border:1px dashed var(--green); padding:15px; border-radius:15px; margin:15px 0;">
            <p style="font-size:12px; font-weight:800; color:var(--green-dark); margin-bottom:10px;">ISIAN KHUSUS HALAMAN DETAIL PRODUK</p>
            <div class="field"><label>Deskripsi Lengkap (Tampil di Dalam)</label><textarea id="form_fullDescription">${esc(currentEditItem.fullDescription)}</textarea></div>
            <div class="field"><label>Fitur-Fitur (Pisahkan tiap baris dengan Enter)</label><textarea id="form_features" style="min-height:60px">${esc(currentEditItem.features)}</textarea></div>
            <div class="field">
              <label>Kumpulan Foto Detail Galeri (Pisahkan dgn Koma)</label>
              <textarea id="form_detailImages" style="min-height:60px" placeholder="Bisa upload lalu ketik koma (,) manual">${esc(currentEditItem.detailImages)}</textarea>
              <label class="upload-btn"><input type="file" style="display:none" accept="image/*" onchange="uploadImageAppend(this, 'form_detailImages')">Upload Tambah Foto</label>
            </div>
            <div class="grid-2">
              <div class="field"><label>Link Tombol Tutorial</label><input id="form_linkTutorial" value="${esc(currentEditItem.linkTutorial)}"></div>
              <div class="field"><label>Link Hubungi Admin (WA/Bantuan)</label><input id="form_linkContact" value="${esc(currentEditItem.linkContact)}"></div>
            </div>
          </div>
        `;
      }
      
      document.getElementById("editorFormContent").innerHTML = formHtml;
      if (type !== 'category') toggleFormFields(); // Memicu logika show/hide form pertama kali
    }

    function toggleFormFields() {
      const type = document.getElementById("form_type").value;
      const act = document.getElementById("form_actionType").value;
      
      // Logika Penampilan Elemen berdasarkan Type & Action
      document.getElementById("wrap_desc").style.display = (type==='link' || type==='banner') ? 'none' : 'block';
      document.getElementById("wrap_img").style.display = (type==='link') ? 'none' : 'block';
      document.getElementById("wrap_btn").style.display = (type==='link' || type==='banner') ? 'none' : 'block';
      
      // Bagian Box Halaman Detail HANYA muncul jika ActionType = 'detail' DAN tipenya bukan Link/Banner
      if (act === 'detail' && type !== 'link' && type !== 'banner') {
          document.getElementById("wrap_detail").style.display = 'block';
      } else {
          document.getElementById("wrap_detail").style.display = 'none';
      }
      
      // Paksa action menjadi Direct Link jika yang dipilih adalah Banner atau Tautan Neon
      if(type === 'link' || type === 'banner') {
          document.getElementById("form_actionType").value = 'direct';
      }
    }

    async function uploadImageAppend(fileInput, targetId) {
      if (!fileInput.files.length) return;
      const targetInput = document.getElementById(targetId);
      const oriVal = targetInput.value;
      targetInput.value = (oriVal ? oriVal + ",\n" : "") + "Sedang mengupload...";
      
      const formData = new FormData(); formData.append("image", fileInput.files[0]);
      try {
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) targetInput.value = (oriVal ? oriVal + ",\n" : "") + data.data.url;
        else throw new Error("Gagal");
      } catch (e) { targetInput.value = oriVal; alert("Upload gagal."); }
      fileInput.value = "";
    }

    function closeEditor() {
      document.getElementById("editorPopup").classList.remove('active');
      document.getElementById("editorStatus").textContent = "";
    }

    async function saveEditorData() {
      const st = document.getElementById("editorStatus");
      st.textContent = "Menyimpan...";
      
      let payload = { id: document.getElementById("form_id").value, title: document.getElementById("form_title").value, sort: document.getElementById("form_sort").value, status: document.getElementById("form_status").value };
      
      if (currentEditType === 'product') {
        Object.assign(payload, {
          type: document.getElementById("form_type").value,
          description: document.getElementById("form_description").value,
          image: document.getElementById("form_image").value,
          link: document.getElementById("form_link").value,
          buttonText: document.getElementById("form_buttonText").value,
          actionType: document.getElementById("form_actionType").value,
          fullDescription: document.getElementById("form_fullDescription").value,
          features: document.getElementById("form_features").value,
          detailImages: document.getElementById("form_detailImages").value,
          linkTutorial: document.getElementById("form_linkTutorial").value,
          linkContact: document.getElementById("form_linkContact").value
        });
      }

      try {
        await api(currentEditType === 'category' ? 'saveCategory' : 'saveProduct', payload);
        st.textContent = "Berhasil disimpan!";
        setTimeout(() => { closeEditor(); refreshAdminData(); }, 1000);
      } catch(e) { st.textContent = e.message; }
    }

    async function deleteItem(actionName, id) {
      if(!confirm("Yakin ingin menghapus item ini?")) return;
      try { await api(actionName, { id }); refreshAdminData(); } catch(e) { alert(e.message); }
    }

    loadData();
  </script>
</body>
</html>
